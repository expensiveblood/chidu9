<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Chidu</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Barlow+Condensed:wght@700;800&display=swap" rel="stylesheet">
<link rel="apple-touch-icon" sizes="180x180" href="apple-touch-icon.png">
<link rel="icon" type="image/png" sizes="32x32" href="favicon-32x32.png">
<link rel="icon" type="image/png" sizes="16x16" href="favicon-16x16.png">
<link rel="icon" type="image/x-icon" href="favicon.ico">
<link rel="manifest" href="site.webmanifest">
<style>

*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
html { scroll-behavior:smooth; background:#2a2018; touch-action:pan-x pan-y; }
body {
  width:100%; min-height:100vh; background:#2a2018;
  font-family:'Inter',sans-serif; overscroll-behavior:none;
  -webkit-user-select:none; -moz-user-select:none;
  -ms-user-select:none; user-select:none; -webkit-touch-callout:none;
}
* { -webkit-tap-highlight-color:transparent; -webkit-touch-callout:none; outline:none; }

/* ── BACKGROUND ── */
.bg {
  position:fixed; inset:0; width:100%; height:100%;
  object-fit:cover; object-position:50% 20%;
  filter:brightness(0.78) blur(22px); transform:scale(1.07);
  z-index:0; display:block; will-change:transform; backface-visibility:hidden;
}
.bg.loaded { animation:unblur 1.4s cubic-bezier(0.22,1,0.36,1) forwards; }
@keyframes unblur {
  from { filter:brightness(0.78) blur(22px); transform:scale(1.07); }
  to   { filter:brightness(0.78) blur(0px); transform:scale(1); }
}

/* ── GRAIN ── */
.grain {
  position:fixed; inset:-100px; z-index:1; pointer-events:none; opacity:0.055;
  background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 512 512' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.75' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
  animation:gr 0.7s steps(2) infinite; mix-blend-mode:overlay; will-change:transform;
}
@keyframes gr {
  0%   { transform:translate(0,0); }
  50%  { transform:translate(-2%,-2%); }
  100% { transform:translate(2%,2%); }
}

/* ── OVERLAY ── */
.overlay {
  position:fixed; inset:0; z-index:2; pointer-events:none;
  background:linear-gradient(to bottom,rgba(0,0,0,0.18) 0%,transparent 30%,transparent 50%,rgba(0,0,0,0.65) 100%);
}

/* ── CONTENT: top and bottom ── */
.content {
  position:relative; z-index:3;
  display:flex; flex-direction:column; justify-content:space-between;
  min-height:100vh; min-height:100svh;
  padding:clamp(28px,5vw,52px) clamp(24px,5vw,52px);
  animation:fadeIn 0.8s ease 0.5s both;
}
@keyframes fadeIn {
  from { opacity:0; transform:translateY(12px); }
  to   { opacity:1; transform:translateY(0); }
}

/* ── TOP: name + socials ── */
.top { display:flex; flex-direction:column; gap:clamp(8px,1.5vw,16px); }

/* ── NAME ── */
.name {
  font-family:'Barlow Condensed',sans-serif; font-weight:800;
  font-size:clamp(72px,18vw,180px); line-height:0.88;
  letter-spacing:0.01em; color:#fff; text-transform:uppercase;
  display:inline-flex; gap:0.01em;
  text-shadow:0 2px 40px rgba(0,0,0,0.3);
}
@keyframes letterSlide {
  0%   { opacity:0; transform:translateX(-36px); }
  100% { opacity:1; transform:translateX(0); }
}
.letter {
  display:inline-block; opacity:0; will-change:transform,opacity;
  animation:letterSlide 0.55s cubic-bezier(0.22,1,0.36,1) forwards;
  animation-delay:calc(0.07s * var(--i) + 0.6s);
}

/* ── SOCIALS ── */
.socials {
  display:flex; align-items:center;
  gap:clamp(16px,3vw,28px);
}
.socials a {
  color:rgba(255,255,255,0.85); text-decoration:none;
  display:flex; align-items:center;
  transition:color 0.22s ease, transform 0.22s ease;
}
.socials a:hover { color:#fff; transform:scale(1.15); }
.socials svg { width:clamp(20px,3.2vw,26px); height:clamp(20px,3.2vw,26px); fill:currentColor; }

/* ── BOTTOM: nav links only ── */
.bottom {
  display:flex;
  align-items:center;
  flex-wrap:wrap;
  gap:clamp(16px,3vw,32px);
}
.bottom a {
  font-family:'Inter',sans-serif;
  font-size:clamp(9px,1vw,11px);
  font-weight:600;
  letter-spacing:0.12em;
  text-transform:uppercase;
  color:rgba(255,255,255,0.7);
  text-decoration:underline;
  text-underline-offset:3px;
  text-decoration-color:rgba(255,255,255,0.3);
  transition:color 0.2s ease;
}
.bottom a:hover { color:#fff; text-decoration-color:rgba(255,255,255,0.7); }

/* ── RESPONSIVE ── */
@media (min-width:1600px) { .content { padding:60px 64px; } .name { font-size:200px; } }
@media (max-width:1024px) and (min-width:769px) { .name { font-size:clamp(80px,14vw,130px); } }
@media (max-width:768px) {
  .name { font-size:clamp(68px,16vw,110px); } .content { padding:32px 28px; }
  .socials { gap:18px; } .socials svg { width:22px; height:22px; }
}
@media (max-width:600px) { .name { font-size:clamp(62px,17vw,90px); } .content { padding:28px 22px; } }
@media (max-width:480px) {
  .name { font-size:clamp(58px,17.5vw,78px); } .content { padding:24px 18px; }
  .socials { gap:14px; } .socials svg { width:20px; height:20px; }
}
@media (max-width:360px) {
  .name { font-size:54px; } .content { padding:20px 16px; }
  .socials { gap:12px; } .socials svg { width:18px; height:18px; }
}
@media (prefers-reduced-motion:reduce) { .grain { animation:none; } }
@supports (padding: max(0px)) {
  .content {
    padding-left:max(clamp(18px,5vw,52px), env(safe-area-inset-left));
    padding-right:max(clamp(18px,5vw,52px), env(safe-area-inset-right));
    padding-top:max(clamp(24px,5vw,52px), env(safe-area-inset-top));
    padding-bottom:max(clamp(28px,5vw,52px), env(safe-area-inset-bottom));
  }
}

</style>
</head>
<body>

<img class="bg" src="images/chidu.jpg" alt="Chidu" loading="eager">
<div class="grain"></div>

<div class="content">

    </h1>
    <div class="socials">

      </a>
      <a href="https://x.com/chiiiduu" target="_blank" rel="noopener" title="Twitter / X">
        <svg viewBox="0 0 24 24"><path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-4.714-6.231-5.401 6.231H2.744l7.73-8.835L1.254 2.25H8.08l4.713 6.231zm-1.161 17.52h1.833L7.084 4.126H5.117z"/></svg>
      </a>
      <a href="https://www.facebook.com/share/181ShVqU9U/" target="_blank" rel="noopener" title="Facebook">

    </div>
  </div>

  <!-- BOTTOM: nav links -->
  <nav class="bottom">
    <a href="about.html">About</a>
    <a href="updates.html">Updates</a>
    <a href="contact.html">Contact</a>
  </nav>

</div>

<script>
(function() {
  var eLink = document.getElementById('emailLink');
  if (eLink) eLink.href = 'mailto:chiiiduu9@gmail.com';

  var bg = document.querySelector('.bg');
  function startBgAnim() {
    requestAnimationFrame(function() {
      requestAnimationFrame(function() { bg.classList.add('loaded'); });
    });
  }
  if (bg.complete && bg.naturalWidth > 0) { startBgAnim(); }
  else {
    bg.addEventListener('load', startBgAnim);
    bg.addEventListener('error', function() { bg.style.filter='brightness(0.5)'; bg.style.transform='scale(1)'; });
  }

  document.addEventListener('visibilitychange', function() {
    var grain = document.querySelector('.grain');
    if (grain) grain.style.animationPlayState = document.hidden ? 'paused' : 'running';
  });
})();
</script>
