/* ── RESET ── */
*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
html { scroll-behavior:smooth; background:#2a2018; }
body {
  width:100%; min-height:100vh; background:#2a2018;
  font-family:'Inter',sans-serif; overscroll-behavior:none;
  -webkit-user-select:none;
  -moz-user-select:none;
  -ms-user-select:none;
  user-select:none;
  -webkit-touch-callout:none;
}
/* Remove blue tap highlight on ALL elements */
* {
  -webkit-tap-highlight-color:transparent;
  -webkit-touch-callout:none;
  outline:none;
}

/* ── BACKGROUND ── */
.bg {
  position:fixed; inset:0; width:100%; height:100%;
  object-fit:cover; object-position:50% 20%;
  filter:brightness(0.78) blur(22px); transform:scale(1.07);
  z-index:0; display:block; will-change:transform; backface-visibility:hidden;
}
.bg.loaded { animation:unblur 1.4s cubic-bezier(0.22,1,0.36,1) forwards; }
@keyframes unblur {
  from { filter:brightness(0.78) blur(22px); transform:scale(1.07); }
  to   { filter:brightness(0.78) blur(0px); transform:scale(1); }
}
@media (min-width:768px)  { .bg { object-position:50% 25%; } }
@media (min-width:1024px) { .bg { object-position:50% 30%; } }
@media (min-width:1440px) { .bg { object-position:50% 35%; } }

/* ── GRAIN ── */
.grain {
  position:fixed; inset:-100px; z-index:1; pointer-events:none; opacity:0.055;
  background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 512 512' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.75' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
  animation:gr 0.7s steps(2) infinite; mix-blend-mode:overlay; will-change:transform;
}
@keyframes gr {
  0%   { transform:translate(0,0); }
  50%  { transform:translate(-2%,-2%); }
  100% { transform:translate(2%,2%); }
}

/* ── OVERLAY ── */
.overlay {
  position:fixed; inset:0; z-index:2; pointer-events:none;
  background:linear-gradient(to bottom,rgba(0,0,0,0.18) 0%,transparent 30%,transparent 50%,rgba(0,0,0,0.65) 100%);
}

/* ── CONTENT ── */
.content {
  position:relative; z-index:3;
  display:flex; flex-direction:column; justify-content:space-between;
  min-height:100vh; min-height:100svh;
  padding:clamp(28px,5vw,52px) clamp(24px,5vw,52px);
  animation:fadeIn 0.8s ease 0.5s both;
}
@keyframes fadeIn {
  from { opacity:0; transform:translateY(12px); }
  to   { opacity:1; transform:translateY(0); }
}

/* ── TOP ── */
.top { display:flex; flex-direction:column; gap:clamp(8px,1.5vw,16px); }

/* ── NAME ── */
.name {
  font-family:'Barlow Condensed',sans-serif; font-weight:800;
  font-size:clamp(72px,18vw,180px); line-height:0.88;
  letter-spacing:0.01em; color:#fff; text-transform:uppercase;
  display:inline-flex; gap:0.01em;
  text-shadow:0 2px 40px rgba(0,0,0,0.3);
}
@keyframes letterSlide {
  0%   { opacity:0; transform:translateX(-36px); }
  100% { opacity:1; transform:translateX(0); }
}
.letter {
  display:inline-block; opacity:0; will-change:transform,opacity;
  animation:letterSlide 0.55s cubic-bezier(0.22,1,0.36,1) forwards;
  animation-delay:calc(0.07s * var(--i) + 0.6s);
}

/* ── BIO ── */
.bio {
  font-size:clamp(11px,1.2vw,13px); font-weight:300;
  line-height:1.75; color:rgba(255,255,255,0.7);
  max-width:clamp(240px,38vw,420px); letter-spacing:0.01em;
}

/* ── SOCIALS ── */
.socials {
  display:flex; align-items:center;
  gap:clamp(16px,3vw,28px); margin-top:clamp(4px,1vw,8px); margin-left:14px;
}
.socials a {
  color:rgba(255,255,255,0.85); text-decoration:none;
  display:flex; align-items:center;
  transition:color 0.22s ease, transform 0.22s ease;
}
.socials a:hover { color:#fff; transform:scale(1.15); }
.socials svg { width:clamp(20px,3.2vw,26px); height:clamp(20px,3.2vw,26px); fill:currentColor; }

/* ── NAV LINKS ── */
.nav-links {
  position:fixed;
  top:clamp(22px,4vw,44px);
  right:clamp(18px,4vw,52px);
  z-index:1000;
  display:flex;
  align-items:center;
  gap:clamp(18px,3vw,36px);
  animation:fadeIn 0.8s ease 0.5s both;
}
.nav-links a {
  font-family:'Inter',sans-serif;
  font-size:clamp(9px,1vw,11px);
  font-weight:600;
  letter-spacing:0.12em;
  text-transform:uppercase;
  color:rgba(255,255,255,0.85);
  text-decoration:none;
  transition:color 0.2s ease;
}
.nav-links a:hover { color:#fff; }
