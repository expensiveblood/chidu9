<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>404 — Chidu</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Barlow+Condensed:wght@700;800&display=swap" rel="stylesheet">
<style>

*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }

html, body {
  width:100%; height:100%;
  background:#2a2018;
  font-family:'Inter', sans-serif;
  overscroll-behavior:none;
  -webkit-user-select:none;
  -moz-user-select:none;
  -ms-user-select:none;
  user-select:none;
  -webkit-touch-callout:none;
}
* {
  -webkit-tap-highlight-color:transparent;
  -webkit-touch-callout:none;
  outline:none;
}

/* ── BACKGROUND ── */
.bg {
  position:fixed; inset:0;
  width:100%; height:100%;
  object-fit:cover; object-position:50% 20%;
  filter:brightness(0.45) blur(18px);
  transform:scale(1.07);
  z-index:0; display:block;
  backface-visibility:hidden;
  animation:bgIn 1.6s cubic-bezier(0.22,1,0.36,1) forwards;
}
@keyframes bgIn {
  from { filter:brightness(0.3) blur(30px); transform:scale(1.12); }
  to   { filter:brightness(0.45) blur(18px); transform:scale(1.07); }
}

/* ── GRAIN ── */
.grain {
  position:fixed; inset:-100px; z-index:1;
  pointer-events:none; opacity:0.05;
  background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 512 512' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.75' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
  animation:gr 0.7s steps(2) infinite;
  mix-blend-mode:overlay; will-change:transform;
}
@keyframes gr {
  0%   { transform:translate(0,0); }
  50%  { transform:translate(-2%,-2%); }
  100% { transform:translate(2%,2%); }
}

/* ── OVERLAY ── */
.overlay {
  position:fixed; inset:0; z-index:2; pointer-events:none;
  background:linear-gradient(to bottom,
    rgba(0,0,0,0.3) 0%,
    rgba(0,0,0,0.15) 40%,
    rgba(0,0,0,0.55) 100%
  );
}

/* ── MAIN CONTENT ── */
.page {
  position:relative; z-index:3;
  min-height:100vh; min-height:100svh;
  display:flex; flex-direction:column;
  align-items:center; justify-content:center;
  padding:clamp(32px,6vw,64px) clamp(24px,5vw,52px);
  text-align:center;
}

/* ── 404 NUMBER ── */
.error-number {
  font-family:'Barlow Condensed', sans-serif;
  font-weight:800;
  font-size:clamp(140px,28vw,320px);
  line-height:0.85;
  letter-spacing:0.02em;
  text-transform:uppercase;
  color:transparent;
  -webkit-text-stroke:1.5px rgba(255,255,255,0.18);
  position:relative;
  animation:numIn 1s cubic-bezier(0.22,1,0.36,1) 0.3s both;
  user-select:none;
}
.error-number::after {
  content:'404';
  position:absolute; inset:0;
  font-family:inherit; font-weight:inherit;
  font-size:inherit; line-height:inherit;
  letter-spacing:inherit;
  color:#fff; opacity:0;
  animation:numGlow 1s cubic-bezier(0.22,1,0.36,1) 0.6s both;
  text-shadow:0 0 80px rgba(255,255,255,0.2), 0 0 160px rgba(255,255,255,0.08);
}
@keyframes numIn {
  0%   { opacity:0; transform:translateY(30px) scale(0.95); }
  100% { opacity:1; transform:translateY(0) scale(1); }
}
@keyframes numGlow {
  0%   { opacity:0; }
  100% { opacity:1; }
}

/* ── DIVIDER ── */
.divider {
  width:0; height:1px;
  background:rgba(255,255,255,0.2);
  margin:clamp(20px,3vw,32px) auto;
  animation:lineExpand 0.8s cubic-bezier(0.22,1,0.36,1) 1s both;
}
@keyframes lineExpand {
  from { width:0; opacity:0; }
  to   { width:clamp(40px,8vw,80px); opacity:1; }
}

/* ── TEXT ── */
.error-tag {
  font-size:9px; font-weight:700;
  letter-spacing:0.18em; text-transform:uppercase;
  color:rgba(255,255,255,0.35);
  animation:fadeUp 0.7s cubic-bezier(0.22,1,0.36,1) 1.1s both;
  margin-bottom:14px;
}
.error-title {
  font-family:'Barlow Condensed', sans-serif;
  font-weight:800; font-size:clamp(28px,5vw,52px);
  text-transform:uppercase; color:#fff;
  letter-spacing:0.03em; line-height:1;
  text-shadow:0 2px 40px rgba(0,0,0,0.4);
  animation:fadeUp 0.7s cubic-bezier(0.22,1,0.36,1) 1.2s both;
  margin-bottom:14px;
}
.error-subtitle {
  font-size:clamp(12px,1.3vw,15px); font-weight:300;
  line-height:1.8; color:rgba(255,255,255,0.6);
  letter-spacing:0.02em; font-style:italic;
  max-width:clamp(280px,50vw,480px);
  text-shadow:0 0 20px rgba(0,0,0,0.8);
  animation:fadeUp 0.7s cubic-bezier(0.22,1,0.36,1) 1.35s both;
  margin-bottom:clamp(28px,4vw,44px);
}
@keyframes fadeUp {
  0%   { opacity:0; transform:translateY(14px); }
  100% { opacity:1; transform:translateY(0); }
}

/* ── BUTTONS ── */
.btn-group {
  display:flex; align-items:center; justify-content:center;
  gap:12px; flex-wrap:wrap;
  animation:fadeUp 0.7s cubic-bezier(0.22,1,0.36,1) 1.5s both;
}
.btn {
  display:inline-flex; align-items:center; gap:8px;
  padding:clamp(10px,1.5vw,13px) clamp(20px,3vw,32px);
  border-radius:999px;
  font-family:'Inter', sans-serif;
  font-size:clamp(9px,1.1vw,11px); font-weight:600;
  letter-spacing:0.08em; text-transform:uppercase;
  text-decoration:none; cursor:pointer;
  transition:background 0.25s ease, transform 0.22s ease, box-shadow 0.25s ease;
  white-space:nowrap;
}
.btn-primary {
  background:rgba(255,255,255,0.12);
  backdrop-filter:blur(20px) saturate(160%);
  -webkit-backdrop-filter:blur(20px) saturate(160%);
  border:1px solid rgba(255,255,255,0.22); color:#fff;
  box-shadow:0 8px 32px rgba(0,0,0,0.25), inset 0 1px 0 rgba(255,255,255,0.18);
}
.btn-primary:hover {
  background:rgba(255,255,255,0.2); transform:translateY(-2px);
  box-shadow:0 14px 40px rgba(0,0,0,0.3), inset 0 1px 0 rgba(255,255,255,0.22);
}
.btn-secondary {
  background:rgba(255,255,255,0.04);
  backdrop-filter:blur(20px); -webkit-backdrop-filter:blur(20px);
  border:1px solid rgba(255,255,255,0.1); color:rgba(255,255,255,0.65);
  box-shadow:0 4px 16px rgba(0,0,0,0.15);
}
.btn-secondary:hover {
  background:rgba(255,255,255,0.08); color:rgba(255,255,255,0.9);
  transform:translateY(-2px); border-color:rgba(255,255,255,0.18);
}
.btn svg {
  width:13px; height:13px; fill:none;
  stroke:currentColor; stroke-width:2;
  stroke-linecap:round; stroke-linejoin:round;
  flex-shrink:0; transition:transform 0.2s ease;
}
.btn-primary:hover svg { transform:translateX(2px); }
.btn-secondary:hover svg { transform:translateX(-2px); }

/* ── BRANDING ── */
.brand {
  position:fixed; top:clamp(24px,5vw,48px); left:clamp(24px,5vw,48px);
  z-index:10;
  font-family:'Barlow Condensed', sans-serif;
  font-weight:800; font-size:clamp(22px,4vw,32px);
  letter-spacing:0.04em; text-transform:uppercase;
  color:rgba(255,255,255,0.9); text-decoration:none;
  animation:fadeSlideDown 0.7s cubic-bezier(0.22,1,0.36,1) 0.2s both;
  transition:color 0.2s ease;
}
.brand:hover { color:#fff; }
@keyframes fadeSlideDown {
  0%   { opacity:0; transform:translateY(-12px); }
  100% { opacity:1; transform:translateY(0); }
}

/* ── COPYRIGHT ── */
.copyright-fixed {
  position:fixed;
  bottom:clamp(12px,2.5vw,24px);
  left:0; right:0;
  z-index:10; pointer-events:none;
  display:flex; justify-content:center; align-items:center;
  padding:0 clamp(12px,3vw,24px);
  animation:fadeUp 0.6s ease 1.8s both;
}
.copyright {
  font-family:'Inter', sans-serif;
  font-size:clamp(7px,1.6vw,10px);
  font-weight:300; letter-spacing:0.08em; text-transform:uppercase;
  color:rgba(255,255,255,0.3);
  white-space:nowrap; text-align:center;
}

/* ── RESPONSIVE ── */
@media (max-width:480px) {
  .error-number { font-size:clamp(120px,35vw,160px); }
  .btn-group { gap:10px; }
  .btn { padding:10px 18px; font-size:9px; }
  .brand { font-size:22px; top:20px; left:20px; }
}
@media (max-width:360px) {
  .error-number { font-size:110px; }
  .btn-group { flex-direction:column; align-items:stretch; }
  .btn { justify-content:center; }
}

@supports (padding: max(0px)) {
  .brand {
    top:max(clamp(24px,5vw,48px), env(safe-area-inset-top));
    left:max(clamp(24px,5vw,48px), env(safe-area-inset-left));
  }
  .copyright-fixed {
    bottom:max(clamp(16px,3vw,28px), env(safe-area-inset-bottom));
    padding-left:max(clamp(12px,3vw,24px), env(safe-area-inset-left));
    padding-right:max(clamp(12px,3vw,24px), env(safe-area-inset-right));
  }
}

@media (prefers-reduced-motion:reduce) { .grain { animation:none; } }

</style>
</head>
<body>

<img class="bg" src="images/chidu.jpg" alt="">
<div class="grain"></div>
<div class="overlay"></div>

<!-- Branding top left -->
<a class="brand" href="index.html">Chidu</a>

<!-- Main -->
<div class="page">

  <div class="error-number">404</div>

  <div class="divider"></div>

  <div class="error-tag">Page not found</div>
  <div class="error-title">You got lost.</div>
  <p class="error-subtitle">
    This page doesn&#8217;t exist &#8212; or maybe it never did.<br>
    Not everyone finds their way. You either get it, or you don&#8217;t.
  </p>

  <div class="btn-group">
    <a href="index.html" class="btn btn-primary">
      Go Home
      <svg viewBox="0 0 24 24"><line x1="5" y1="12" x2="19" y2="12"/><polyline points="13 6 19 12 13 18"/></svg>
    </a>
  </div>

</div>

<!-- Copyright -->
<div class="copyright-fixed">
  <span class="copyright">&copy; 2026 Chidu. All rights reserved &nbsp;&middot;&nbsp; v3.3.3</span>
</div>

</body>
</html>
