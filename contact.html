<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Contact — Chidu</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Barlow+Condensed:wght@700;800&display=swap" rel="stylesheet">
<link rel="apple-touch-icon" sizes="180x180" href="apple-touch-icon.png">
<link rel="icon" type="image/png" sizes="32x32" href="favicon-32x32.png">
<link rel="icon" type="image/png" sizes="16x16" href="favicon-16x16.png">
<link rel="icon" type="image/x-icon" href="favicon.ico">
<link rel="manifest" href="site.webmanifest">
<style>

*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
html { scroll-behavior:smooth; background:#2a2018; touch-action:pan-x pan-y; }
body {
  width:100%; min-height:100vh; background:#2a2018;
  font-family:'Inter',sans-serif; overscroll-behavior:none;
  -webkit-user-select:none; -moz-user-select:none;
  -ms-user-select:none; user-select:none; -webkit-touch-callout:none;
}
* { -webkit-tap-highlight-color:transparent; -webkit-touch-callout:none; outline:none; }

.bg {
  position:fixed; inset:0; width:100%; height:100%;
  object-fit:cover; object-position:50% 20%;
  filter:brightness(0.6); z-index:0; display:block;
}
.grain {
  position:fixed; inset:-100px; z-index:1; pointer-events:none; opacity:0.055;
  background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 512 512' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.75' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
  animation:gr 0.7s steps(2) infinite; mix-blend-mode:overlay;
}
@keyframes gr {
  0%   { transform:translate(0,0); }
  50%  { transform:translate(-2%,-2%); }
  100% { transform:translate(2%,2%); }
}
.overlay {
  position:fixed; inset:0; z-index:2; pointer-events:none;
  background:linear-gradient(to bottom,rgba(0,0,0,0.35) 0%,rgba(0,0,0,0.2) 50%,rgba(0,0,0,0.6) 100%);
}

.content {
  position:relative; z-index:3;
  display:flex; flex-direction:column; justify-content:space-between;
  min-height:100vh; min-height:100svh;
  padding:clamp(28px,5vw,52px) clamp(24px,5vw,52px);
  animation:fadeIn 0.8s ease 0.4s both;
}
@keyframes fadeIn {
  from { opacity:0; transform:translateY(12px); }
  to   { opacity:1; transform:translateY(0); }
}

.back-link {
  font-family:'Inter',sans-serif;
  font-size:clamp(9px,1vw,11px); font-weight:600;
  letter-spacing:0.12em; text-transform:uppercase;
  color:rgba(255,255,255,0.4); text-decoration:none;
  transition:color 0.2s ease; align-self:flex-start;
}
.back-link:hover { color:#fff; }

.bottom { display:flex; flex-direction:column; }

.page-label {
  font-size:clamp(9px,1vw,11px); font-weight:600;
  letter-spacing:0.16em; text-transform:uppercase;
  color:rgba(255,255,255,0.35); margin-bottom:clamp(12px,2vw,20px);
}
.page-title {
  font-family:'Barlow Condensed',sans-serif; font-weight:800;
  font-size:clamp(52px,12vw,130px); line-height:0.88;
  letter-spacing:0.01em; color:#fff; text-transform:uppercase;
  text-shadow:0 2px 40px rgba(0,0,0,0.3); margin-bottom:clamp(20px,3vw,36px);
}
.divider { width:40px; height:1px; background:rgba(255,255,255,0.25); margin-bottom:clamp(16px,2.5vw,28px); }

.contact-list { display:flex; flex-direction:column; gap:clamp(16px,2.5vw,24px); max-width:clamp(280px,50vw,480px); }
.contact-item { display:flex; flex-direction:column; gap:4px; }
.contact-label {
  font-size:clamp(9px,0.9vw,10px); font-weight:600;
  letter-spacing:0.14em; text-transform:uppercase; color:rgba(255,255,255,0.3);
}
.contact-value {
  font-size:clamp(13px,1.4vw,16px); font-weight:400;
  color:rgba(255,255,255,0.85); letter-spacing:0.01em;
  text-decoration:none; transition:color 0.2s ease;
  -webkit-user-select:text; user-select:text;
}
a.contact-value:hover { color:#fff; }

.nav-links {
  display:flex; align-items:center; flex-wrap:wrap;
  gap:clamp(16px,3vw,32px); margin-top:clamp(28px,4vw,44px);
}
.nav-links a {
  font-family:'Inter',sans-serif; font-size:clamp(9px,1vw,11px); font-weight:600;
  letter-spacing:0.12em; text-transform:uppercase;
  color:rgba(255,255,255,0.6); text-decoration:underline;
  text-underline-offset:3px; text-decoration-color:rgba(255,255,255,0.25);
  transition:color 0.2s ease;
}
.nav-links a:hover, .nav-links a.active { color:#fff; text-decoration-color:rgba(255,255,255,0.6); }

@media (max-width:768px) { .content { padding:32px 28px; } }
@media (max-width:480px) { .content { padding:24px 18px; } }
@media (max-width:360px) { .content { padding:20px 16px; } }
@media (prefers-reduced-motion:reduce) { .grain { animation:none; } }
@supports (padding: max(0px)) {
  .content {
    padding-left:max(clamp(18px,5vw,52px), env(safe-area-inset-left));
    padding-right:max(clamp(18px,5vw,52px), env(safe-area-inset-right));
    padding-bottom:max(clamp(28px,5vw,52px), env(safe-area-inset-bottom));
    padding-top:max(clamp(24px,5vw,52px), env(safe-area-inset-top));
  }
}

</style>
</head>
<body>

<img class="bg" src="images/chidu.jpg" alt="Chidu" loading="eager">
<div class="grain"></div>
<div class="overlay"></div>

<div class="content">
  <a class="back-link" href="index.html">&#8592; Back</a>
  <div class="bottom">
    <div class="page-label">Contact</div>
    <h1 class="page-title">Get in<br>Touch</h1>
    <div class="divider"></div>
    <div class="contact-list">
      <div class="contact-item">
        <span class="contact-label">Email</span>
        <a class="contact-value" id="emailLink" href="#">chiiiduu9@gmail.com</a>
      </div>
      <div class="contact-item">
        <span class="contact-label">Instagram</span>
        <a class="contact-value" href="https://instagram.com/chiiiduu" target="_blank" rel="noopener">@chiiiduu</a>
      </div>
      <div class="contact-item">
        <span class="contact-label">Twitter / X</span>
        <a class="contact-value" href="https://x.com/chiiiduu" target="_blank" rel="noopener">@chiiiduu</a>
      </div>
    </div>
    <nav class="nav-links">
      <a href="about.html">About</a>
      <a href="updates.html">Updates</a>
      <a href="contact.html" class="active">Contact</a>
    </nav>
  </div>
</div>

<script>
(function() {
  var eLink = document.getElementById('emailLink');
  if (eLink) eLink.href = 'mailto:chiiiduu9@gmail.com';
  var bg = document.querySelector('.bg');
  bg.addEventListener('error', function() { bg.style.filter='brightness(0.4)'; });
  document.addEventListener('visibilitychange', function() {
    var grain = document.querySelector('.grain');
    if (grain) grain.style.animationPlayState = document.hidden ? 'paused' : 'running';
  });
})();
</script>
</body>
</html>
